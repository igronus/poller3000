temporal:
  targets:
    - host: "localhost"
      port: 7233
      namespace: "default"
    - host: "prod.temporal.io"
      port: 7233
      namespace: "production"

monitoring:
  poll_interval_seconds: 30
  handlers:
    lost_worker: "/path/to/handler/lost-worker"
    redundant_worker: "/path/to/handler/redundant-worker"
